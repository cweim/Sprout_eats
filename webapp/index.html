<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Discovery Bot</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Leaflet.js for maps (used in next plan) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- App styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <h1>My Places</h1>
        <div class="view-toggle">
            <button id="btn-map" class="toggle-btn active">Map</button>
            <button id="btn-list" class="toggle-btn">List</button>
        </div>
    </header>

    <main class="app-main">
        <!-- Map View -->
        <div id="map-view" class="view active">
            <div id="map"></div>
            <div class="map-controls">
                <button id="btn-my-location" class="map-control-btn" title="My Location">📍</button>
                <button id="btn-fit-all" class="map-control-btn" title="Show All Places">🗺️</button>
            </div>
        </div>

        <!-- List View -->
        <div id="list-view" class="view">
            <div class="list-controls">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search places...">
                    <button id="search-clear" class="search-clear-btn" style="display: none;">×</button>
                </div>
                <div id="filter-chips" class="filter-chips">
                    <!-- Category chips will be inserted here -->
                </div>
                <div class="sort-controls">
                    <span class="results-count" id="results-count"></span>
                    <select id="sort-select" class="sort-select">
                        <option value="newest">Newest</option>
                        <option value="name">Name A-Z</option>
                        <option value="rating">Top Rated</option>
                    </select>
                </div>
            </div>
            <div id="places-list">
                <!-- Place cards will be inserted here -->
            </div>
            <div id="no-results" class="no-results" style="display: none;">
                <p>No places match your search</p>
                <p class="hint">Try a different search term or clear filters</p>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="loading-state">
            <div class="loading-spinner"></div>
            <p>Loading your places...</p>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <p>No places saved yet!</p>
            <p class="hint">Send a video link to the bot to get started.</p>
        </div>
    </main>

    <!-- Notes Editor Modal -->
    <div id="notes-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Notes</h2>
                <button id="modal-close" class="modal-close-btn">×</button>
            </div>
            <div class="modal-body">
                <textarea id="notes-textarea" placeholder="Add your notes here..." maxlength="500"></textarea>
                <div class="notes-char-count"><span id="char-count">0</span>/500</div>
            </div>
            <div class="modal-footer">
                <button id="notes-cancel" class="modal-btn">Cancel</button>
                <button id="notes-save" class="modal-btn primary">Save</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
